<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hygiene measures - Mobile Edition</title>
    <style>
        /* 全体の背景をベージュに設定 */
        body {
            background-color: #f5f5dc; 
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* スコアなどのUI表示エリア */
        #ui {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #dcdcdc; /* ベージュに馴染む境界線 */
        }

        /* ゲーム画面（キャンバス） */
        canvas {
            border: 1px solid #ccc;
            background-color: #fdf5e6; /* 少し明るいベージュで視認性を確保 */
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* iPhone用タッチ操作ボタンのデザイン */
        #controls {
            display: flex;
            width: 100%;
            max-width: 800px;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn {
            width: 70px;
            height: 70px;
            background-color: rgba(0, 0, 0, 0.05);
            border: 2px solid #ccc;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background-color: rgba(0, 0, 0, 0.1);
        }

        #shoot-btn {
            width: 90px;
            height: 90px;
            background-color: rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="stage">Stage: 1</div>
        <div id="lives">Lives: 3</div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="controls">
        <div style="display: flex; gap: 20px;">
            <div id="left-btn" class="btn">◀</div>
            <div id="right-btn" class="btn">▶</div>
        </div>
        <div id="shoot-btn" class="btn">SHOT</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const stageElement = document.getElementById('stage');

        // --- 画像資産の定義 ---
        const enemyImages = [];
        for (let i = 1; i <= 5; i++) {
            const img = new Image();
            img.src = `enemy${i}.png`; 
            enemyImages.push(img);
        }
        const playerImg = new Image(); playerImg.src = 'player.png';
        const bulletImg = new Image(); bulletImg.src = 'bullet.png';
        const enemyBulletImg = new Image(); enemyBulletImg.src = 'enemy_bullet.png';
        const ufoImg = new Image(); ufoImg.src = 'ufo.png'; 

        // 配色の定義（シックな色合い）
        const BLACK = "#333333";
        const SHIELD_COLOR = "#8b4513"; // ベージュに合う茶系のシールド

        // ゲーム状態の管理
        let score = 0, lives = 3, stage = 1, gameOver = false;
        let enemies = [], bullets = [], enemyBullets = [], shields = [];
        let enemyDirection = 1, enemyMoveTimer = 0, enemyMoveInterval = 600;

        let ufo = { x: -60, y: 30, width: 50, height: 25, speed: 3, active: false };
        const player = { x: 375, y: 540, width: 40, height: 30, speed: 5 };

        // 入力制御（キーボード + タッチ）
        const keys = {};
        const touchInputs = { left: false, right: false, shoot: false };

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        const setupBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); touchInputs[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); touchInputs[key] = false; });
            btn.addEventListener('mousedown', (e) => { touchInputs[key] = true; });
            btn.addEventListener('mouseup', (e) => { touchInputs[key] = false; });
        };
        setupBtn('left-btn', 'left');
        setupBtn('right-btn', 'right');
        setupBtn('shoot-btn', 'shoot');

        function initEnemies() {
            enemies = [];
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 10; col++) {
                    enemies.push({ x: 157 + col * 50, y: 65 + row * 45, width: 35, height: 30, row: row, alive: true });
                }
            }
        }

        function initShields() {
            shields = [];
            const shieldCount = 4, shieldWidth = 70;
            const gap = (canvas.width - (shieldCount * shieldWidth)) / (shieldCount + 1);
            for (let i = 0; i < shieldCount; i++) {
                let startX = gap + i * (shieldWidth + gap), startY = 450;
                for (let row = 0; row < 5; row++) {
                    for (let col = 0; col < 10; col++) {
                        shields.push({ x: startX + col * 7, y: startY + row * 7, width: 7, height: 7, alive: true });
                    }
                }
            }
        }

        function update() {
            if (gameOver) return;

            // 自機の移動
            if ((keys['ArrowLeft'] || touchInputs.left) && player.x > 10) player.x -= player.speed;
            if ((keys['ArrowRight'] || touchInputs.right) && player.x < canvas.width - player.width - 10) player.x += player.speed;

            // 弾の発射（1発のみ制限）
            if ((keys['Space'] || touchInputs.shoot) && bullets.length === 0) {
                bullets.push({ x: player.x + player.width / 2 - 5, y: player.y, width: 10, height: 20, speed: 7 });
            }

            // UFO出現ロジック
            if (!ufo.active && Math.random() < 0.002) { ufo.active = true; ufo.x = -ufo.width; }
            if (ufo.active) { ufo.x += ufo.speed; if (ufo.x > canvas.width) ufo.active = false; }

            // 自機の弾更新
            bullets.forEach((bullet, bIndex) => {
                bullet.y -= bullet.speed;
                if (bullet.y < 0) bullets.splice(bIndex, 1);
                
                shields.forEach(s => {
                    if (s.alive && bullet.x < s.x + s.width && bullet.x + bullet.width > s.x && bullet.y < s.y + s.height && bullet.y + bullet.height > s.y) {
                        s.alive = false; bullets.splice(bIndex, 1);
                    }
                });

                if (ufo.active && bullet.x < ufo.x + ufo.width && bullet.x + bullet.width > ufo.x && bullet.y < ufo.y + ufo.height && bullet.y + bullet.height > ufo.y) {
                    ufo.active = false; bullets.splice(bIndex, 1); score += 150; scoreElement.innerText = `Score: ${score}`;
                }

                enemies.forEach((enemy) => {
                    if (enemy.alive && bullet.x < enemy.x + enemy.width && bullet.x + bullet.width > enemy.x && bullet.y < enemy.y + enemy.height && bullet.y + bullet.height > enemy.y) {
                        enemy.alive = false; bullets.splice(bIndex, 1); score += (5 - enemy.row) * 10; scoreElement.innerText = `Score: ${score}`;
                    }
                });
            });

            // 敵の移動ロジック
            let now = Date.now();
            if (now - enemyMoveTimer > enemyMoveInterval) {
                let hitEdge = false;
                enemies.forEach(enemy => {
                    if (!enemy.alive) return;
                    enemy.x += 10 * enemyDirection;
                    if (enemy.x > canvas.width - 40 || enemy.x < 10) hitEdge = true;
                });
                if (hitEdge) {
                    enemyDirection *= -1;
                    enemies.forEach(enemy => { 
                        enemy.y += 20; 
                        if (enemy.y > player.y - player.height) gameOver = true; 
                    });
                }
                enemyMoveTimer = now;
            }

            // 敵の攻撃
            if (Math.random() < 0.02 && enemies.some(e => e.alive)) {
                const aliveEnemies = enemies.filter(e => e.alive);
                const shooter = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                enemyBullets.push({ x: shooter.x + shooter.width/2 - 4, y: shooter.y, width: 8, height: 16, speed: 4 });
            }

            // 敵の弾更新
            enemyBullets.forEach((eb, index) => {
                eb.y += eb.speed;
                if (eb.y > canvas.height) enemyBullets.splice(index, 1);

                shields.forEach(s => {
                    if (s.alive && eb.x < s.x + s.width && eb.x + eb.width > s.x && eb.y < s.y + s.height && eb.y + eb.height > s.y) {
                        s.alive = false; enemyBullets.splice(index, 1);
                    }
                });

                if (eb.x < player.x + player.width && eb.x + eb.width > player.x && eb.y < player.y + player.height && eb.y + eb.height > player.y) {
                    enemyBullets.splice(index, 1); lives--; livesElement.innerText = `Lives: ${lives}`;
                    if (lives <= 0) gameOver = true;
                }
            });

            // ステージクリア判定
            const anyAlive = enemies.some(e => e.alive);
            if (!anyAlive && enemies.length > 0) {
                stage++; stageElement.innerText = `Stage: ${stage}`;
                initEnemies();
                enemyMoveInterval = Math.max(100, enemyMoveInterval - 50); // 徐々に速く
                bullets = []; enemyBullets = [];
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = BLACK;
                ctx.font = "bold 40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width/2, 280);
                ctx.font = "20px sans-serif";
                ctx.fillText("Reload to Restart", canvas.width/2, 330);
                return;
            }

            // シールド描画
            shields.forEach(s => { if (s.alive) { ctx.fillStyle = SHIELD_COLOR; ctx.fillRect(s.x, s.y, s.width, s.height); } });

            // 各種エンティティ描画
            if (ufo.active) ctx.drawImage(ufoImg, ufo.x, ufo.y, ufo.width, ufo.height);
            ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
            bullets.forEach(b => ctx.drawImage(bulletImg, b.x, b.y, b.width, b.height));
            enemyBullets.forEach(eb => ctx.drawImage(enemyBulletImg, eb.x, eb.y, eb.width, eb.height));

            enemies.forEach(enemy => {
                if (enemy.alive) {
                    const img = enemyImages[enemy.row];
                    ctx.drawImage(img, enemy.x, enemy.y, enemy.width, enemy.height);
                }
            });

            requestAnimationFrame(() => { update(); draw(); });
        }

        initEnemies();
        initShields(); 
        draw();
    </script>
</body>
</html>
